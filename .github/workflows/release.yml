name: Cross Platform Release

concurrency:
  group: release-build
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*.*.*'   # matches semantic version tags like v2025.03.1234

permissions:
  contents: write

env:
  VERSION_MAJOR: 2026
  VERSION_MINOR: 3
  VERSION_PATCH: 1921
  QT_VERSION: 6.6.2

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ########################################
      # Install Ninja
      ########################################
      - name: Install Ninja
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt update
            sudo apt install -y ninja-build
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install -y ninja
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install ninja
          fi
        shell: bash

      ########################################
      # Install CLI Tools (see readme.md)
      ########################################
      - name: Install CLI Tools
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt update
            sudo apt install -y librsvg2-bin icoutils

          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install -y rsvg-convert
            choco install msys2 -y

            C:\tools\msys64\usr\bin\bash -lc "
              pacman -Sy --noconfirm \
                mingw-w64-x86_64-icoutils
            "

            echo "C:\tools\msys64\mingw64\bin" >> $GITHUB_PATH

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install librsvg icoutils
          fi
        shell: bash

      ########################################
      # Install Qt
      ########################################
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qt3d qtquick3d qtshadertools

      ########################################
      # Configure
      ########################################
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} \
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} \
            -DPROJECT_VERSION_PATCH=${{ env.VERSION_PATCH }}

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} `
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} `
            -DPROJECT_VERSION_PATCH=${{ env.VERSION_PATCH }}

      - name: Configure macOS
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} \
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} \
            -DPROJECT_VERSION_PATCH=${{ env.VERSION_PATCH }}

      ########################################
      # Build
      ########################################
      - name: Build
        run: cmake --build build --config Release

      ########################################
      # Platform Packaging
      ########################################
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          ls -l build ; \
          tar -czf circuit-cell-linux.tar.gz -C build .

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive build\* circuit-cell-win64.zip

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          ls -l build ; \
          macdeployqt build/circuit-cell.app ; \
          ls -l build ; \
          ditto -c -k --sequesterRsrc --keepParent build/circuit-cell.app circuit-cell-mac.zip

      ########################################
      # Upload Build Artifacts (temporary)
      ########################################
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifact
          path: |
            *.zip
            *.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux-artifact
          path: release

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-artifact
          path: release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macOS-artifact
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
