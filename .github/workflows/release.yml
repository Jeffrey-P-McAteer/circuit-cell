name: Cross Platform Release

concurrency:
  group: release-build
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*.*.*'   # matches semantic version tags like v2025.03.1234

permissions:
  contents: write

env:
  VERSION_MAJOR: 2026
  VERSION_MINOR: 3
  VERSION_PATCH: 1938
  QT_VERSION: 6.6.2

jobs:
  build:
    strategy:
      matrix:
        #os: [ubuntu-latest, windows-latest, macos-latest]
        os: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ########################################
      # Install Ninja
      ########################################
      - name: Install Ninja
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt update
            sudo apt install ninja-build -y
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install ninja
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install ninja
          fi
        shell: bash

      ########################################
      # Install CLI Tools (see readme.md)
      ########################################
      - name: Install CLI Tools
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt update
            sudo apt install -y librsvg2-bin icoutils

            wget https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
            chmod +x linuxdeployqt-continuous-x86_64.AppImage
            ./linuxdeployqt-continuous-x86_64.AppImage --appimage-extract
            mv squashfs-root deployqt
            sudo ln -s $PWD/deployqt/AppRun /usr/local/sbin/linuxdeployqt
            sudo ln -s $PWD/deployqt/AppRun /usr/bin/linuxdeployqt
            sudo rm -f linuxdeployqt-continuous-x86_64.AppImage

          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install -y rsvg-convert
            choco install msys2 -y

            C:\\tools\\msys64\\usr\\bin\\bash -lc "
              pacman -Sy --noconfirm \
                mingw-w64-x86_64-icoutils
            "

            echo "C:\tools\msys64\mingw64\bin" >> $GITHUB_PATH

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install librsvg icoutils
          fi
        shell: bash

      ########################################
      # Install Qt
      ########################################
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qt3d qtquick3d qtshadertools

      ########################################
      # Configure
      ########################################
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} \
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} \
            -DPROJECT_VERSION_PATCH=${{ env.VERSION_PATCH }}

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} `
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} `
            -DPROJECT_VERSION_PATCH=${{ env.VERSION_PATCH }}

      - name: Configure macOS
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} \
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} \
            -DPROJECT_VERSION_PATCH=${{ env.VERSION_PATCH }}

      - name: Locate latest Visual Studio
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # vswhere is installed by default on hosted runners
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
              -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath
          if (-not $vs) { throw "Visual Studio with VC tools not found" }
          echo "VS_PATH=$vs" >> $env:GITHUB_ENV

      ########################################
      # Build
      ########################################
      - name: Build
        run: cmake --build build --config Release

      ########################################
      # Platform Packaging
      ########################################
      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ls -l build ; \
          export VERSION="$VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH" ; \
          linuxdeployqt build/circuit-cell -appimage ; \
          tar -czf circuit-cell-linux.tar.gz -C build .

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "%VS_PATH%\VC\Auxiliary\Build\vcvarsall.bat" x64
          echo VCINSTALLDIR=%VCINSTALLDIR%
          windeployqt --release --compiler-runtime --qmldir . build\Release\circuit-cell.exe
          .\build\Release\vc_redist.x64.exe /extract:.\build\Release /quiet
          powershell Compress-Archive build\Release\* circuit-cell-win64.zip

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          ls -l build ; \
          macdeployqt build/circuit-cell.app ; \
          ls -l build ; \
          ditto -c -k --sequesterRsrc --keepParent build/circuit-cell.app circuit-cell-mac.zip

      ########################################
      # Upload Build Artifacts (temporary)
      ########################################
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifact
          path: |
            *.zip
            *.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux-artifact
          path: release

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-artifact
          path: release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macOS-artifact
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
