name: Cross Platform Release

concurrency:
  group: release-build
  cancel-in-progress: true

on:
  push:
    branches:
      - release

permissions:
  contents: write

env:
  VERSION_MAJOR: 0
  VERSION_MINOR: 1
  QT_VERSION: 6.6.2

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ########################################
      # Install Ninja
      ########################################
      - name: Install Ninja
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt update
            sudo apt install ninja-build -y
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install ninja
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install ninja
          fi
        shell: bash

      ########################################
      # Install Qt
      ########################################
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: qt3d

      ########################################
      # Configure
      ########################################
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} \
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} \
            -DPROJECT_VERSION_PATCH=${{ github.run_number }}

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} `
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} `
            -DPROJECT_VERSION_PATCH=${{ github.run_number }}

      - name: Configure macOS
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION_MAJOR=${{ env.VERSION_MAJOR }} \
            -DPROJECT_VERSION_MINOR=${{ env.VERSION_MINOR }} \
            -DPROJECT_VERSION_PATCH=${{ github.run_number }}

      ########################################
      # Build
      ########################################
      - name: Build
        run: cmake --build build --config Release

      ########################################
      # Platform Packaging
      ########################################
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          ls -l build \
          tar -czf circuit-cell-linux.tar.gz -C build .

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive build\* circuit-cell-win64.zip

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          ls -l build \
          macdeployqt build/circuit-cell.app \
          ls -l build \
          ditto -c -k --sequesterRsrc --keepParent build/circuit-cell.app circuit-cell-mac.zip

      ########################################
      # Upload Build Artifacts (temporary)
      ########################################
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifact
          path: |
            *.zip
            *.tar.gz
